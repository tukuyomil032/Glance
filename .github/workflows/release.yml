name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Extract version
        id: version
        run: |
          VERSION=$(awk '/MARKETING_VERSION/ { gsub(/[; \t]/, "", $3); print $3; exit }' \
                    glance.xcodeproj/project.pbxproj)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} not found — proceeding with release."
          fi

      - name: Build arm64 archive
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project glance.xcodeproj \
            -scheme glance \
            -configuration Release \
            -archivePath build/glance-arm64.xcarchive \
            -destination 'generic/platform=macOS' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO 2>&1 | xcpretty

      - name: Build x86_64 archive
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project glance.xcodeproj \
            -scheme glance \
            -configuration Release \
            -archivePath build/glance-x86_64.xcarchive \
            -destination 'generic/platform=macOS' \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO 2>&1 | xcpretty

      - name: Build universal archive
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project glance.xcodeproj \
            -scheme glance \
            -configuration Release \
            -archivePath build/glance-universal.xcarchive \
            -destination 'generic/platform=macOS' \
            "ARCHS=arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO 2>&1 | xcpretty

      - name: Create DMGs
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/dmg

          for ARCH in arm64 x86_64 universal; do
            APP="build/glance-${ARCH}.xcarchive/Products/Applications/glance.app"
            STAGING="build/dmg-staging-${ARCH}"
            mkdir -p "$STAGING"
            cp -R "$APP" "$STAGING/glance.app"

            hdiutil create \
              -volname "glance" \
              -srcfolder "$STAGING" \
              -ov \
              -format UDZO \
              "build/dmg/glance-${VERSION}-${ARCH}.dmg"

            echo "Created: glance-${VERSION}-${ARCH}.dmg"
          done

      - name: Compute DMG SHA256 hashes
        if: steps.tag_check.outputs.exists == 'false'
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA=$(shasum -a 256 "build/dmg/glance-${VERSION}-arm64.dmg" | awk '{print $1}')
          INTEL_SHA=$(shasum -a 256 "build/dmg/glance-${VERSION}-x86_64.dmg" | awk '{print $1}')
          echo "arm=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm64 SHA256: ${ARM_SHA}"
          echo "x86_64 SHA256: ${INTEL_SHA}"

      - name: Install Sparkle tools
        if: steps.tag_check.outputs.exists == 'false'
        run: brew install sparkle

      - name: Sign DMGs and generate appcast
        if: steps.tag_check.outputs.exists == 'false'
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -R)

          UNIVERSAL_DMG="build/dmg/glance-${VERSION}-universal.dmg"
          UNIVERSAL_SIG=$(echo "$SPARKLE_EDDSA_KEY" | sign_update "$UNIVERSAL_DMG" --ed-key-file - 2>/dev/null || echo "PLACEHOLDER")
          UNIVERSAL_SIZE=$(stat -f%z "$UNIVERSAL_DMG")

          cat > appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>glance Updates</title>
              <link>https://github.com/tukuyomil032/glance</link>
              <description>Appcast feed for glance updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
                <enclosure url="https://github.com/tukuyomil032/glance/releases/download/v${VERSION}/glance-${VERSION}-universal.dmg"
                           type="application/octet-stream"
                           sparkle:edSignature="${UNIVERSAL_SIG}"
                           length="${UNIVERSAL_SIZE}" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Commit appcast.xml
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" || git commit -m "chore: update appcast for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main || true

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: glance ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            ## glance ${{ steps.version.outputs.tag }}

            Quick Look Markdown preview extension for macOS.

            ### Downloads
            | File | Architecture |
            |------|--------------|
            | `glance-${{ steps.version.outputs.version }}-universal.dmg` | Apple Silicon + Intel (recommended) |
            | `glance-${{ steps.version.outputs.version }}-arm64.dmg` | Apple Silicon only |
            | `glance-${{ steps.version.outputs.version }}-x86_64.dmg` | Intel only |

            ### Install
            1. Open the DMG and drag glance.app to Applications
            2. Launch glance.app once to register the Quick Look extension
            3. Press Space on any `.md` file in Finder
          files: |
            build/dmg/glance-${{ steps.version.outputs.version }}-arm64.dmg
            build/dmg/glance-${{ steps.version.outputs.version }}-x86_64.dmg
            build/dmg/glance-${{ steps.version.outputs.version }}-universal.dmg

      - name: Update appcast Gist
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          CONTENT=$(cat appcast.xml | jq -Rs .)
          curl -s -X PATCH \
            -H "Authorization: token $GIST_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/$GIST_ID \
            -d "{\"files\":{\"appcast.xml\":{\"content\":$CONTENT}}}"

      - name: Update homebrew-tap cask
        if: steps.tag_check.outputs.exists == 'false'
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA="${{ steps.sha256.outputs.arm }}"
          INTEL_SHA="${{ steps.sha256.outputs.intel }}"
          BRANCH="bump/glance-${VERSION}"

          git clone "https://x-access-token:${HOMEBREW_PAT}@github.com/tukuyomil032/homebrew-tap.git" tap
          cd tap

          sed -i '' \
            -e "s/version \"[^\"]*\"/version \"${VERSION}\"/" \
            -e "s/sha256 arm:   \"[^\"]*\"/sha256 arm:   \"${ARM_SHA}\"/" \
            -e "s/         intel: \"[^\"]*\"/         intel: \"${INTEL_SHA}\"/" \
            Casks/glance.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add Casks/glance.rb
          git diff --cached --quiet && echo "No cask changes" || {
            git commit -m "feat: bump glance to ${VERSION}"
            git push "https://x-access-token:${HOMEBREW_PAT}@github.com/tukuyomil032/homebrew-tap.git" "${BRANCH}"
            curl -s -X POST \
              -H "Authorization: bearer ${HOMEBREW_PAT}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/tukuyomil032/homebrew-tap/pulls" \
              -d "{\"title\":\"feat: bump glance to ${VERSION}\",\"body\":\"Automated cask bump via release.yml\",\"head\":\"${BRANCH}\",\"base\":\"main\"}"
          }
