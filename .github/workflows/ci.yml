name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project glance.xcodeproj \
            -scheme glance \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | xcpretty

      - name: Verify app bundle metadata
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name glance.app | head -n 1)
          test -n "$APP_PATH"
          test "$(plutil -extract LSUIElement raw "$APP_PATH/Contents/Info.plist")" = "true"
          test "$(plutil -extract SUFeedURL raw "$APP_PATH/Contents/Info.plist")" = "https://raw.githubusercontent.com/tukuyomil032/Glance/main/appcast.xml"
          test "$(plutil -extract SUPublicEDKey raw "$APP_PATH/Contents/Info.plist")" = "83CwhlQ4Kk/ZkkllZSAbFuDpQoZKbQP3OT/3sWw94sE="

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project glance.xcodeproj \
            -scheme glance \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:glanceTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | xcpretty

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
